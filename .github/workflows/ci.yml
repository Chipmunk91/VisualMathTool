name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Math operation sanity suite
        run: npx tsx scripts/test-mathops.ts
      - name: Symbol handle renderer contract
        run: npx tsx scripts/test-symbol-handles.ts
      - name: Canonical tree architecture invariants
        run: npx tsx scripts/test-tree-architecture.ts
      - name: Tree animation state contract
        run: npx tsx scripts/test-tree-animation.ts
      - name: Calculus readiness and notation contract
        run: npm run test:calculus-defaults
      - name: Special-action inverse contract
        run: npm run test:special-actions
      - name: Operations-registry derivation invariant
        run: npm run test:registry
      - name: Domain-fact contract
        run: npm run test:facts
      - name: Equation protocol contract
        run: npm run test:protocol
      - name: Equation MCP contract
        run: npm run test:mcp
      - name: Shared equation session contract
        run: npm run test:shared
      - name: Bundle durable equation Worker
        run: npm run worker:check
      - name: Durable Worker REST, live sync, and remote MCP contract
        run: npm run test:worker
      - name: Rewrite-engine tests
        run: npx tsx scripts/test-rewrites.ts
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
