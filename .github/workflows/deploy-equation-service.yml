name: Deploy Equation Session Service

on:
  push:
    branches: [main]
    paths:
      - "server/cloudflare/**"
      - "server/mcp/**"
      - "src/tools/equation-builder/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-equation-service.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:shared
      - run: npm run worker:check
      - run: npm run worker:deploy
